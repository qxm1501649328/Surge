[custom]
;不要随意改变关键字，否则会导致出错
;修改自 acl4SSR规则  @St7evechou

;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持

; === 0) 从截图提取：放到最前面 ===
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,argotunnel.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,duckcoding.com
ruleset=🇺🇲 美国节点,[]DOMAIN-SUFFIX,zoomeye.ai
ruleset=REJECT,[]DOMAIN-SUFFIX,clarity.ms
ruleset=🎯 全球直连,[]DOMAIN,api.uniapi.io

;设置规则标志位
; === 1) 谷歌趋势：只匹配主站，不要再加其它公共域 ===
ruleset=📈 谷歌趋势,[]DOMAIN,trends.google.com

; === 2) Google 公共依赖：固定到一个稳定策略，避免切换造成会话风控 ===
; 建议新建一个策略组：📌 Google 公共（指向固定节点，例如固定美国或你常用节点）
ruleset=📌 Google 公共,[]DOMAIN,accounts.google.com
ruleset=📌 Google 公共,[]DOMAIN,apis.google.com
ruleset=📌 Google 公共,[]DOMAIN,ogs.google.com
ruleset=📌 Google 公共,[]DOMAIN,clients6.google.com
ruleset=📌 Google 公共,[]DOMAIN-SUFFIX,gstatic.com
ruleset=📌 Google 公共,[]DOMAIN-SUFFIX,googleusercontent.com
ruleset=📌 Google 公共,[]DOMAIN-SUFFIX,googleapis.com
ruleset=📌 Google 公共,[]DOMAIN-SUFFIX,google-analytics.com
ruleset=📌 Google 公共,[]DOMAIN-SUFFIX,googletagmanager.com
ruleset=📌 Google 公共,[]DOMAIN-SUFFIX,doubleclick.net

; === 3) 谷歌搜索：只匹配真正需要的域，避免与公共域重叠 ===
ruleset=🎯 谷歌搜索,[]DOMAIN,www.google.com
ruleset=🎯 谷歌搜索,[]DOMAIN,encrypted-tbn0.gstatic.com   ; 搜图缩略图

